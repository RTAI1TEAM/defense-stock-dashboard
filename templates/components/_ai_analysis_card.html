<div id="analysis-section" class="card border-0" style="border-radius: 12px;">
    <div class="ai-summary-box mt-2 mb-1">
        <div class="ai-summary-text">
            <div class="ai-summary-label">핵심 요약</div>
            <div class="ai-summary-content">{{ ai_news }}</div>
        </div>

        <div class="ai-score-box">
            <div class="ai-score-label">AI 투자 점수</div>
            <div class="ai-score-value">{{ score }}점</div>
        </div>
    </div>

    <div class="list-group list-group-flush ai-news-list">
        {% for news in news_list %}
        <a href="{{ news.link }}" target="_blank" class="list-group-item list-group-item-action">
            <div class="ai-news-title">• {{ news.title }}</div>
        </a>
        {% endfor %}
    </div>
</div>

<div id="analysis-section" class="card shadow-sm border-0" style="border-radius: 12px;">
    <div class="card-header {{ color_class }} text-white py-2 text-center border-0">
        <h6 class="mb-0 fw-bold">AI 투자 점수: {{ score }}점</h6>
    </div>

    <div class="card-body p-2">

        <div class="bg-light p-2 rounded-2 mb-2 border-start border-3 border-primary">
            <div style="font-size: 0.65rem; color: #666; font-weight: bold;">핵심 요약</div>
            <div class="fw-bold mt-1" style="font-size: 0.75rem; line-height: 1.2;">{{ ai_news }}</div>
        </div>
        <div class="list-group list-group-flush mb-2">
            {% for news in news_list %}
            <a href="{{ news.link }}" target="_blank" class="list-group-item list-group-item-action px-1 py-1 border-0" style="font-size: 0.75rem;">
                <div class="text-truncate text-dark">• {{ news.title }}</div>
            </a>
            {% endfor %}
        </div>

    </div>
</div>

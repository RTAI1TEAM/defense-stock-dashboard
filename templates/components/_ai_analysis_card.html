<style>
    /* 한 줄로 자르고 넘치면 ... 표시 */
    .news-summary {
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #495057;
        font-size: 0.95rem;
    }
    .list-group-item:hover {
        background-color: #f8f9fa;
    }
</style>

<div id="analysis-section">
    <div class="card shadow-sm mb-4 border-0 bg-light">
        <div class="card-body text-center">
            <h4 class="mb-3">🤖 AI 투자 매력도: <strong>{{ score }}점</strong></h4>
            <div class="progress" style="height: 25px; border-radius: 12px;">
                <div class="progress-bar {{ color_class }} progress-bar-striped progress-bar-animated" 
                     role="progressbar" style="width: {{ score }}%;" 
                     aria-valuenow="{{ score }}" aria-valuemin="0" aria-valuemax="100">
                </div>
            </div>
        </div>
    </div>
    
    <h5 class="fw-bold mb-3 mt-4">📌 실시간 핵심 뉴스 요약</h5>
    <div class="list-group shadow-sm border-0">
        {% for news in news_list %}
        <a href="{{ news.link }}" target="_blank" class="list-group-item list-group-item-action border-start-0 border-end-0 py-3">
            <div class="d-flex align-items-center">
                <span class="me-2 text-primary">●</span>
                <span class="news-summary">{{ news.ai_summary }}</span>
            </div>
        </a>
        {% else %}
        <div class="list-group-item text-center text-muted">최근 관련 뉴스가 없습니다.</div>
        {% endfor %}
    </div>

</div>

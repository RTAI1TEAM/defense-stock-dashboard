<!-- [파일 역할] AI가 분석한 뉴스 요약 정보와 투자 점수를 시각화하는 카드 컴포넌트
- AI 핵심 요약 텍스트와 산출된 점수를 상단에 배치
- 투자 점수(Score)에 따라 배경색을 3단계(위험/보통/안전)로 동적 변경
- 관련 뉴스 원문 리스트를 하단에 반복문으로 출력 -->

<!-- ──────────────────────────────────────────────
AI 뉴스 및 투자 점수 요약 컴포넌트
────────────────────────────────────────────── -->

<!-- 1. 전체 카드 컨테이너 설정 (테두리 제거 및 라운드 적용) -->
<div class="card border-0" style="border-radius: 12px;">
    
    <!-- 2. 상단 요약 정보 및 점수 레이아웃 영역 -->
    <div class="ai-summary-box mt-2 mb-1">
        
        <!-- 3. AI 핵심 요약 텍스트 출력부 -->
        <div class="ai-summary-text">
            <div class="ai-summary-label">핵심 요약</div>
            <div class="ai-summary-content">{{ ai_news }}</div>
        </div>

        <!-- 4. AI 투자 점수 및 점수별 배경색 조건부 렌더링
        - 40점 미만: 빨간색 계열 (Danger)
        - 70점 미만: 노란색 계열 (Warning)
        - 70점 이상: 초록색 계열 (Success) -->
        <div class="ai-score-box" style="background: linear-gradient(135deg,{% if score < 40 %} #dc2626, #ef4444
                                            {% elif score < 70 %} #f59e0b, #fbbf24
                                            {% else %} #16a34a, #22c55e {% endif %} );">
            <div class="ai-score-label">AI 투자 점수</div>
            <div class="ai-score-value">{{ score }}점</div>
        </div>
    </div>

    <!-- 5. 관련 뉴스 목록 반복 출력 영역 (Jinja2 for문) -->
    <div class="list-group list-group-flush ai-news-list">
        {% for news in news_list %}
        <a href="{{ news.link }}" target="_blank" class="list-group-item list-group-item-action">
            <div class="ai-news-title">• {{ news.title }}</div>
        </a>
        {% endfor %}
    </div>
</div>


<div class="dropdown">
  <button class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside">
    {{ stock.name_kr }} <span class="text-muted ms-1">{{ stock.ticker }}</span>
  </button>

  <div class="dropdown-menu stock-dropdown-menu">
    <div class="stock-dropdown-header">
      <input
        type="text"
        id="stockSearchInput"
        class="form-control stock-search-input"
        placeholder="종목명 또는 코드 검색"
        autocomplete="off"
      >
    </div>

    <div class="stock-dropdown-list" id="stockDropdownList">
      {% for s in stock_list %}
      <a
        class="dropdown-item stock-item"
        href="/chart/{{ s['ticker'] }}"
        data-name="{{ s['name_kr']|lower }}"
        data-ticker="{{ s['ticker']|lower }}"
      >
        <div class="fw-bold">{{ s['name_kr'] }}</div>
        <div class="stock-code">{{ s['ticker'] }}</div>
      </a>
      {% endfor %}
      <div id="stockEmptyMessage" class="stock-empty">검색 결과가 없습니다.</div>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const input = document.getElementById("stockSearchInput");
    const items = document.querySelectorAll(".stock-item");
    const emptyMessage = document.getElementById("stockEmptyMessage");

    if (!input) return;

    input.addEventListener("input", function () {
        const keyword = this.value.trim().toLowerCase();
        let visibleCount = 0;

        items.forEach(item => {
            const name = item.dataset.name || "";
            const ticker = item.dataset.ticker || "";

            const matched = name.includes(keyword) || ticker.includes(keyword);

            if (matched) {
                item.style.display = "block";
                visibleCount++;
            } else {
                item.style.display = "none";
            }
        });

        emptyMessage.style.display = visibleCount === 0 ? "block" : "none";
    });

    document.querySelectorAll('[data-bs-toggle="dropdown"]').forEach(btn => {
        btn.addEventListener("shown.bs.dropdown", function () {
            setTimeout(() => input.focus(), 100);
        });
    });
});
</script>

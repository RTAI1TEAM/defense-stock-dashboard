<div id="invest-section">
    <div class="d-flex align-items-center mb-1">
        {% if show_invest_back_button|default(true) %}

        <button onclick="goBack()" class="back-btn me-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
            </svg>
        </button>
        {% endif %}
        <h4 class="trade-card-title">💰 모의 투자</h4>
    </div>

    <!-- 알고리즘 매매 전략 선택 -->
    <div class="analysis-section">
        <label class="algorithm-title">알고리즘 매매 전략 선택</label>
        <select class="form-select algorithm-select" id="strategySelector">
            {% for key, val in strategies.items() %}
            <option value="{{ val.name }}" data-profit="{{ val.profit }}">
                {{ val.name }} (과거 수익률: {{ val.profit }}%)
            </option>
            {% endfor %}
            <option value="수동 운용" data-profit="">수동 운용 (자동 매매 미적용)</option>
        </select>
    </div>

    <form id="tradeForm">
        <input type="hidden" name="stock_id" value="{{ stock.ticker }}">
        <input type="hidden" id="tradeTypeInput" name="trade_type" value="BUY">
        <input type="hidden" id="strategyInput" name="strategy" value="">

        <!-- 구매 가격 -->
        <div class="mt-1">
            <label class="trade-label">구매 가격</label>
            <div class="input-group">
                <input type="number" class="form-control trade-form" value="{{ current_price|int }}" readonly>
                <span class="input-group-text">원</span>
            </div>
        </div>

        <!-- 수량 -->
        <div class="mb-2">
            <label class="trade-label">수량</label>
            <div class="input-group">
                <input type="number" id="tradeQuantity" class="form-control trade-form" name="quantity" min="1" value="1" required>
                <span class="input-group-text">주</span>
            </div>
        </div>
        <hr style="margin-bottom: 8px;">

        <!-- 구매 가능 금액 -->
        <div class="d-flex justify-content-between align-items-center">
            <span class="trade-label text-secondary">구매 가능 금액</span>
            <span class="fw-bold"><span id="current-balance">{{ "{:,.0f}".format(account.current_balance) if account else '0' }}</span> 원</span>
        </div>

        <!-- 총 주문 금액 -->
        <div class="d-flex justify-content-between align-items-center mb-1">
            <span class="trade-label text-secondary">총 주문 금액</span>
            <span class="fw-bold text-primary" id="totalAmount">{{ "{:,.0f}".format(current_price) }} 원</span>
        </div>

        <!-- 잔액 부족 경고 -->
        <div id="balanceWarning" class="text-danger mb-3" style="display:none; font-size:13px;">
            구매 가능 금액 내에서만 주문이 가능합니다.
        </div>

        <div class="trade-buttons">
            <button type="button" class="btn-buy" onclick="handleTrade('BUY')">매수</button>
        </div>
    </form>
</div>

<script>
document.getElementById('strategyInput').value = document.getElementById('strategySelector').value;

document.getElementById('strategySelector').addEventListener('change', function() {
    document.getElementById('strategyInput').value = this.options[this.selectedIndex].value;
});

const pricePerShare = {{ current_price|int }};
let currentBalance = {{ account.current_balance|int if account else 0 }};
let maxQuantity = Math.floor(currentBalance / pricePerShare);

document.getElementById('tradeQuantity').setAttribute('max', maxQuantity);

function updateTotal() {
    let quantity = parseInt(document.getElementById('tradeQuantity').value) || 1;
    const warning = document.getElementById('balanceWarning');

    if (quantity > maxQuantity) {
        quantity = maxQuantity;
        document.getElementById('tradeQuantity').value = maxQuantity;
        warning.style.display = 'block';
    } else {
        warning.style.display = 'none';
    }

    if (quantity < 1) {
        quantity = 1;
        document.getElementById('tradeQuantity').value = 1;
    }

    document.getElementById('totalAmount').innerText = (pricePerShare * quantity).toLocaleString() + ' 원';
}

document.getElementById('tradeQuantity').addEventListener('input', updateTotal);

function handleTrade(type) {
    document.getElementById('tradeTypeInput').value = type;

    const formData = new FormData(document.getElementById('tradeForm'));

    fetch("{{ url_for('stock_detail.execute_trade') }}", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert(data.message);

            if (data.new_balance) {
                const newBalanceNum = parseInt(data.new_balance.replace(/,/g, ''));
                if (!isNaN(newBalanceNum)) {
                    currentBalance = newBalanceNum;
                    maxQuantity = Math.floor(currentBalance / pricePerShare);
                    document.getElementById('current-balance').innerText = data.new_balance;
                    document.getElementById('tradeQuantity').setAttribute('max', maxQuantity);
                }
            }

            document.getElementById('tradeQuantity').value = 1;
            document.getElementById('totalAmount').innerText = pricePerShare.toLocaleString() + ' 원';
            document.getElementById('balanceWarning').style.display = 'none';

        } else {
            alert("거래 실패: " + data.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert("통신 오류가 발생했습니다.");
    });
}
</script>

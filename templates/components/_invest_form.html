<div id="invest-section" class="card shadow border-0 p-4" style="border-radius: 15px;">
    <div class="d-flex align-items-center mb-4">
        <button onclick="goBack()" class="back-btn me-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
            </svg>
        </button>
        <h4 class="fw-bold text-success mb-0">💰 투자 설정</h4>
    </div>

    <!-- 알고리즘 매매 전략 선택 -->
    <div class="mb-3">
        <label class="form-label fw-bold">알고리즘 매매 전략 선택</label>
        <select class="form-select form-select-lg" id="strategySelector">
            {% for key, val in strategies.items() %}
            <option value="{{ val.name }}" data-profit="{{ val.profit }}">
                {{ val.name }} (과거 수익률: {{ val.profit }}%)
            </option>
            {% endfor %}
        </select>
    </div>

    <form id="tradeForm">
        <input type="hidden" name="stock_id" value="{{ stock.ticker }}">
        <input type="hidden" id="tradeTypeInput" name="trade_type" value="BUY">
        <input type="hidden" id="strategyInput" name="strategy" value="5/20 골든크로스">

        <!-- 구매 가격 -->
        <div class="mb-3">
            <label class="form-label fw-bold">구매 가격</label>
            <div class="input-group">
                <input type="number" class="form-control form-control-lg" value="{{ current_price|int }}" readonly>
                <span class="input-group-text">원</span>
            </div>
        </div>

        <!-- 수량 -->
        <div class="mb-3">
            <label class="form-label fw-bold">수량</label>
            <div class="input-group">
                <input type="number" id="tradeQuantity" class="form-control form-control-lg" name="quantity" min="1" value="1" required>
                <span class="input-group-text">주</span>
            </div>
        </div>

        <hr>

        <!-- 구매 가능 금액 -->
        <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="text-secondary fw-bold">구매 가능 금액</span>
            <span class="fw-bold"><span id="current-balance">{{ "{:,.0f}".format(account.current_balance) if account else '0' }}</span> 원</span>
        </div>

        <!-- 총 주문 금액 -->
        <div class="d-flex justify-content-between align-items-center mb-1">
            <span class="text-secondary fw-bold">총 주문 금액</span>
            <span class="fw-bold text-primary" id="totalAmount">{{ "{:,.0f}".format(current_price) }} 원</span>
        </div>

        <!-- 잔액 부족 경고 -->
        <div id="balanceWarning" class="text-danger mb-3" style="display:none; font-size:13px;">
            구매 가능 금액 내에서만 주문이 가능합니다.
        </div>

        <div class="d-flex gap-2 mt-3">
            <button type="button" class="btn btn-success flex-fill py-3 fw-bold" onclick="handleTrade('BUY')">매수</button>
            <button type="button" class="btn btn-danger flex-fill py-3 fw-bold" onclick="handleTrade('SELL')">매도</button>
        </div>
    </form>
</div>

<script>
document.getElementById('strategySelector').addEventListener('change', function() {
    const selectedOption = this.options[this.selectedIndex];
    document.getElementById('strategyInput').value = selectedOption.value;
});

const pricePerShare = {{ current_price|int }};
const currentBalance = {{ account.current_balance|int if account else 0 }};
const maxQuantity = Math.floor(currentBalance / pricePerShare);

document.getElementById('tradeQuantity').setAttribute('max', maxQuantity);

document.getElementById('tradeQuantity').addEventListener('input', function() {
    let quantity = parseInt(this.value) || 1;
    const warning = document.getElementById('balanceWarning');

    if (quantity > maxQuantity) {
        quantity = maxQuantity;
        this.value = maxQuantity;
        warning.style.display = 'block';
    } else {
        warning.style.display = 'none';
    }

    if (quantity < 1) {
        quantity = 1;
        this.value = 1;
    }

    const total = pricePerShare * quantity;
    document.getElementById('totalAmount').innerText = total.toLocaleString() + ' 원';
});

function handleTrade(type) {
    document.getElementById('tradeTypeInput').value = type;
    
    const form = document.getElementById('tradeForm');
    const formData = new FormData(form);

    fetch("{{ url_for('stock_detail.execute_trade') }}", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert(data.message);
            
            const balanceElement = document.getElementById('current-balance');
            if (balanceElement && data.new_balance) {
                balanceElement.innerText = data.new_balance;
            }

            document.getElementById('tradeQuantity').value = 1;
            document.getElementById('totalAmount').innerText = pricePerShare.toLocaleString() + ' 원';
            document.getElementById('balanceWarning').style.display = 'none';

        } else {
            alert("거래 실패: " + data.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert("통신 오류가 발생했습니다.");
    });
}
</script>

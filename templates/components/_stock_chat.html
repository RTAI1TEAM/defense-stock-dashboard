<div class="dashboard-card">
    <div class="card-body d-flex flex-column p-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="mb-0 fw-bold">종목 토론방</h6>
        </div>

        <div id="chat-msg-list" class="stock-chat-messages border rounded p-2 mb-2 bg-light">
            {% if chat_messages %}
                {% for chat in chat_messages %}
                <div class="stock-chat-item mb-2 pb-2 border-bottom">
                    <div class="d-flex justify-content-between align-items-center">
                        <strong class="small text-primary">{{ chat.nickname }}</strong>
                        <small class="text-muted">{{ chat.created_at }}</small>
                    </div>
                    <div class="small text-dark mt-1">{{ chat.message }}</div>
                </div>
                {% endfor %}
            {% else %}
                <div class="text-muted small">아직 등록된 채팅이 없습니다.</div>
            {% endif %}
        </div>

        <div class="mt-auto">
            <input type="hidden" id="chat-ticker" value="{{ ticker }}">
            <div class="input-group">
                <input type="text"
                       id="chat-input-msg"
                       class="form-control form-control-sm"
                       placeholder="채팅을 입력하세요"
                       onkeypress="if(event.keyCode==13){sendChat(); return false;}">
                <button type="button" onclick="sendChat()" class="btn btn-primary btn-sm">전송</button>
            </div>
        </div>
    </div>
</div>

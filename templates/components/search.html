{% macro search_bar(id, placeholder) %}
<input type="text" id="{{ id }}" class="form-control" placeholder="{{ placeholder }}" autocomplete="off" 
    style="border-radius: 16px; font-weight: normal; color: #333; font-size: 0.85rem; padding: 8px 16px; line-height: 1.5; vertical-align: middle;">
{% endmacro %}

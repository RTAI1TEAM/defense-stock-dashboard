<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}기본 제목{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@1.0.1/dist/chartjs-adapter-moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.2.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/stock_table.js') }}"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
  <a class="navbar-brand" href="/">
    <img src="{{ url_for('static', filename='images/logo.png') }}" height="32"></a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarTogglerDemo02" aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
    
    <ul class="navbar-menu">
      <li class="nav-item {% if request.path == '/' %}active{% endif %}">
        <a class="nav-link" href="/">홈</a>
      </li>
      <li class="nav-item {% if request.path.startswith('/stocks') or request.path.startswith('/chart')  %}active{% endif %}">
        <a class="nav-link" href="{{ url_for('stocks.stock_list') }}">차트</a>
      </li>
      <li class="nav-item {% if request.path == '/portfolio' %}active{% endif %}">
        <a class="nav-link" href="/portfolio">포트폴리오</a>
      </li>
      <li class="nav-item {% if request.path == '/news' %}active{% endif %}">
        <a class="nav-link" href="/news">뉴스</a>
      </li>
      <li class="nav-item {% if request.path == '/rank' %}active{% endif %}">
        <a class="nav-link" href="/rank">랭킹</a>
      </li>
    </ul>
    <div class="navbar-right">
    <div class="position-relative ml-3" style="width:260px;">

<input
type="text"
id="navbarStockSearch"
class="form-control"
placeholder="🔍주식명 혹은 종목번호 입력"
autocomplete="off"
style="border-radius: 16px;"
>

<div id="navbarStockResults"
     class="list-group position-absolute w-100 shadow"
     style="z-index:999; display:none; max-height:300px; overflow-y:auto;">

{% for s in stock_list %}

<a class="list-group-item list-group-item-action navbar-stock-item"
   href="/stocks/{{ s['ticker'] }}"
   data-name="{{ s['name_kr']|lower }}"
   data-ticker="{{ s['ticker']|lower }}">

<div class="fw-bold">{{ s['name_kr'] }}</div>
<div class="text-muted small">{{ s['ticker'] }}</div>

</a>

{% endfor %}

<div id="navbarEmpty"
     class="list-group-item text-muted"
     style="display:none">

검색 결과가 없습니다

</div>

</div>

</div>

    {% if "nickname" in session %}
  <a href="{{ url_for('profile_bp.show_profile') }}"
    class="navbar-profile d-flex align-items-center mx-4 text-decoration-none">
      <div class="navbar-avatar" id="navbarAvatar">
          {{ session.get("avatar", "🧑‍💼") }}
      </div>
      <span class="ms-2 fw-semibold text-dark" id="navbarNickname">
          {{ session["nickname"] }} 님
      </span>
</a>
{% else %}
<a href="{{ url_for('auth_bp.login_page') }}" class="mx-2">
    로그인
</a>
{% endif %}
  </div>
</div>
</nav>
{% block content %}
    기본 내용
{% endblock %}

<script>

document.addEventListener("DOMContentLoaded", function(){

const input = document.getElementById("navbarStockSearch");
const results = document.getElementById("navbarStockResults");
const items = document.querySelectorAll(".navbar-stock-item");
const empty = document.getElementById("navbarEmpty");

if(!input) return;

input.addEventListener("input", function(){

const keyword = this.value.trim().toLowerCase();

if(keyword === ""){
results.style.display = "none";
return;
}

results.style.display = "block";

let visible = 0;

items.forEach(item => {

const name = item.dataset.name;
const ticker = item.dataset.ticker;

if(name.includes(keyword) || ticker.includes(keyword)){

item.style.display = "block";
visible++;

}else{

item.style.display = "none";

}

});

empty.style.display = visible === 0 ? "block" : "none";

});

document.addEventListener("click", function(e){

if(!input.contains(e.target) && !results.contains(e.target)){
results.style.display = "none";
}

});

});

</script>

</body>
</html>

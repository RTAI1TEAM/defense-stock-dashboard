<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}기본 제목{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
  <a class="navbar-brand mx-4" href="/">🚀AI Quant</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarTogglerDemo02" aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
    <ul class="navbar-nav mr-auto mt-2 mt-lg-0">
      <li class="nav-item {% if request.path == '/' %}active{% endif %}">
        <a class="nav-link" href="/">홈</a>
      </li>
      <li class="nav-item {% if request.path.startswith('/chart') %}active{% endif %}">
        <a class="nav-link" href="{{ url_for('stock_detail.show_stock_chart', ticker='064350') }}">차트</a>
      </li>
      <li class="nav-item {% if request.path == '/portfolio' %}active{% endif %}">
        <a class="nav-link" href="/portfolio">포트폴리오</a>
      </li>
      <li class="nav-item {% if request.path == '/news' %}active{% endif %}">
        <a class="nav-link" href="/news">뉴스</a>
      </li>
      <li class="nav-item {% if request.path == '/rank' %}active{% endif %}">
        <a class="nav-link" href="/rank">랭킹</a>
      </li>

    </ul>
    <form class="form-inline my-2 my-lg-0 mx-3">
      <input class="form-control mr-sm-2" type="search" placeholder="Search">
      <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
    </form>
    <a href="#" class="mx-4">내 프로필</a>
    <a href="{{url_for('auth_bp.logout')}}" class="mx-4">로그아웃</a>
  </div>
</nav>

{% block content %}
    기본 내용
{% endblock %}

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Quant - 회원가입</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0f1117;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    .card {
      background-color: #1c1f2e;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo h1 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
    }

    .logo p {
      color: #6b7280;
      font-size: 14px;
      margin-top: 8px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group input {
      width: 100%;
      background-color: #2a2d3e;
      border: 1px solid #3a3d4e;
      border-radius: 8px;
      padding: 16px 18px;
      color: #ffffff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-group input::placeholder { color: #6b7280; }
    .form-group input:focus { border-color: #3b82f6; }

    .btn-signup {
      width: 100%;
      background-color: #3b82f6;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s;
      font-family: inherit;
    }

    .btn-signup:hover { background-color: #2563eb; }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      color: #6b7280;
      font-size: 14px;
    }

    .footer-text a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }

    .error-msg {
      background-color: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
      color: #ef4444;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <h1>🚀 AI Quant</h1>
      <p>이메일로 회원가입</p>
    </div>

    <!-- 에러 메시지 -->
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <!-- Flask로 전송하는 form -->
    <form action="/register" method="POST">
      <div class="form-group">
        <input type="text" name="nickname" placeholder="닉네임" required />
      </div>

      <div class="form-group">
        <input type="email" name="email" placeholder="이메일" required />
      </div>

      <div class="form-group">
        <input type="password" name="password" placeholder="비밀번호" required />
      </div>

      <div class="form-group">
        <input type="password" name="password2" placeholder="비밀번호 확인" required />
      </div>

      <button type="submit" class="btn-signup">회원가입</button>
    </form>

    <div class="footer-text">
      이미 계정이 있으신가요? <a href="/">로그인</a>
    </div>
  </div>

</body>
</html>

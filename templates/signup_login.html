<!-- [파일 역할] AI Quant 서비스의 회원가입 및 이메일 인증을 처리하는 뷰 페이지
- 1단계: 닉네임, 이메일, 비밀번호 등 사용자 기본 정보 입력 수집
- 2단계: 서버에서 발송한 6자리 이메일 인증번호 검증 (show_code 조건부)
- 히든 필드(Hidden input)를 활용해 인증 단계에서도 이전 입력 데이터를 서버로 유지 전송 -->

<!-- ──────────────────────────────────────────────
헤드 및 스타일 정의 영역
────────────────────────────────────────────── -->

<head>
    <!-- 1. 문서 메타 정보 및 외부 자원 연결 (CSS, JS)
    - signup.js: 입력값 유효성 검사 및 동적 처리를 위한 스크립트 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quant - 회원가입</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/signup.css')}}">
    <script src="{{ url_for('static', filename='js/signup.js')}}" defer></script>
    
    <!-- 2. 내부 커스텀 스타일 및 브랜드 폰트 설정
    - LeferiBaseType: 전체적인 브랜드 통일감을 위한 폰트 적용
    - placeholder: 입력창 내부 안내 문구 색상 고정 -->
    <style>
        @font-face {
            font-family: 'LeferiBaseType-BoldA';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/LeferiBaseType-BoldA.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        * {
            font-family: 'LeferiBaseType-BoldA', 'Apple SD Gothic Neo', sans-serif !important;
        }
        .form-group input::placeholder {
            color: #888888 !important;
            opacity: 1;
        }
    </style>
</head>

<!-- ──────────────────────────────────────────────
회원가입 본문 및 조건부 폼 레이아웃 영역
────────────────────────────────────────────── -->

<body style="background-color: #daf0f7;">

    <div class="card" style="background-color: #ffffff;">
        <!-- 3. 브랜드 로고 및 섹션 타이틀 -->
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="AI Quant" style="width: 200px;">
            <p style="color: #0C4AB3; font-weight: bold; margin-top: 8px;">이메일로 회원가입</p>
        </div>

        <!-- 4. 서버 에러 발생 시 안내 메시지 노출 (Jinja2) -->
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form action="/register" method="POST">

            <!-- 5. [분기 1] 이메일 인증번호 입력 단계 (show_code 활성화 시)
            - 1단계에서 입력한 정보를 hidden 필드에 담아 인증 완료 시 함께 제출 -->
            {% if show_code %}
                <input type="hidden" name="email" value="{{ email }}" />
                <input type="hidden" name="password" value="{{ password }}" />
                <input type="hidden" name="nickname" value="{{ nickname }}" />
                <div class="form-group">
                    <input type="text" name="code" placeholder="인증번호 6자리 입력" required
                        style="background-color: #E6EEFA; color: #333333; border: none;" />
                </div>
                <button type="submit" class="btn-signup">인증 완료</button>

            <!-- 6. [분기 2] 초기 정보 입력 단계 (회원가입 시작 시)
            - 닉네임, 이메일, 비밀번호 2중 확인 필드 제공
            - 에러 발생 시 기존 입력값을 value에 유지하여 재입력 불편 최소화 -->
            {% else %}
                <div class="form-group">
                    <input type="text" name="nickname" placeholder="닉네임" {% if error %} value="{{ nickname }}"{% endif %} required
                        style="background-color: #E6EEFA; color: #333333; border: none;" />
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일" {% if error %} value="{{ email }}"{% endif %} required
                        style="background-color: #E6EEFA; color: #333333; border: none;" />
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="비밀번호" required
                        style="background-color: #E6EEFA; color: #333333; border: none;" />
                </div>
                <div class="form-group">
                    <input type="password" name="password2" placeholder="비밀번호 확인" required
                        style="background-color: #E6EEFA; color: #333333; border: none;" />
                </div>
                <button type="submit" class="btn-signup">회원가입</button>
            {% endif %}

        </form>

        <!-- 7. 로그인 페이지 이동 및 푸터 텍스트 -->
        <div class="footer-text">
            이미 계정이 있으신가요? <a href="/login">로그인</a>
        </div>
    </div>

</body>

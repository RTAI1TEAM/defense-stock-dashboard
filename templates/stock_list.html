{% extends "navbar.html" %}
{% from "components/stock_table_macros.html" import stock_rank_table %}

{% block title %}K-방산 전일 기준 차트{% endblock %}

{% block content %}
<style>
    /* 순위 컬럼 클릭 방지 설정
       '순위'는 데이터 정렬에 따라 바뀌는 값이 아니라 고정된 순서여야 하므로, 
       테이블 헤더(th) 중 첫 번째 칸의 정렬 및 클릭 기능을 CSS로 비활성화
    */
    #defenseTable th:first-child {
        /* 1. 마우스 클릭 및 모든 이벤트를 무시하게 만듭니다 (정렬 방지 핵심) */
        pointer-events: none !important; 
        /* 2. 마우스를 올려도 손가락 모양(pointer)이 아닌 일반 화살표로 보이게 합니다 */
        cursor: default !important;      
    }
    /* 마우스 호버 효과 제거 */
    #defenseTable th:first-child:hover {
        background-color: transparent !important;
    }
</style>

<div class="container-fluid px-2 mt-2 mb-2">
<div class="container">
    <!-- stock_rank_table 매크로를 사용하여 'K-방산' 종목 리스트를 테이블 형태로 렌더링 -->
       <!-- 전달된 stocks 데이터는 거래대금 순으로 정렬된 상태 -->
    {{ stock_rank_table('defenseTable', 'K-방산 전일 기준 목록', stocks, 999, True) }}
</div>
</div>
{% endblock %}
